# ==============================================================================
# MINISO AI Engine - CI/CD Pipeline (Phase 3)
# ==============================================================================
# GitHub Actions 持续集成流水线
#
# 触发条件: push/PR 到 main 或 develop 分支
# 流水线阶段:
#   1. backend-tests   - Python pytest (788 用例)
#   2. frontend-build  - Next.js TypeScript + 构建
#   3. docker-build    - Docker 镜像构建验证 (仅 main 分支)
#
# 依赖缓存: pip + npm
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==================================================================
  # 后端测试 — Python pytest
  # ==================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        run: |
          python -m pytest --tb=short -q --maxfail=10
        env:
          APP_ENV: test
          TZ: Asia/Shanghai

  # ==================================================================
  # 前端构建 — Next.js TypeScript 检查 + 生产构建
  # ==================================================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_TRENDPULSE_URL: http://localhost:8001
          NEXT_PUBLIC_IDEAFORGE_URL: http://localhost:8002
          NEXT_PUBLIC_MARKETPROBE_URL: http://localhost:8003

  # ==================================================================
  # Docker 镜像构建验证 (仅 main 分支)
  # ==================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t miniso-backend ./backend

      - name: Build frontend image
        run: docker build -t miniso-frontend ./frontend
