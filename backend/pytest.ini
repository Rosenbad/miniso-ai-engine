# ==============================================================================
# pytest 配置 - 名创优品 AI 产品开发智能决策引擎
# ==============================================================================
[pytest]
# 测试发现路径
testpaths = tests
# 测试文件命名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# pytest-asyncio 自动模式 (无需 @pytest.mark.asyncio 装饰器)
asyncio_mode = auto
# 输出风格
addopts = -v --tb=short --strict-markers
