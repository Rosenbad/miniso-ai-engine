# ==============================================================================
# 名创优品 AI 产品开发智能决策引擎 - Alembic 配置
# ==============================================================================
# 使用方法:
#   cd backend
#   # 设置环境变量 DATABASE_URL (与 .env 中保持一致)
#   # 本地开发: export DATABASE_URL=postgresql://miniso:miniso@localhost:5432/miniso_ai
#   alembic upgrade head     # 应用所有迁移
#   alembic revision --autogenerate -m "描述"  # 生成新迁移
#   alembic downgrade -1     # 回滚一步
#
# 注意:
#   - sqlalchemy.url 留空, 由 alembic/env.py 从环境变量 DATABASE_URL 注入
#   - 迁移使用 psycopg2 同步驱动 (asyncpg 不支持 Alembic 的同步操作)
#   - 模型定义在 shared/orm_models.py, env.py 中导入以支持 autogenerate
# ==============================================================================

[alembic]
# 迁移脚本目录
script_location = alembic

# 模板文件 (默认即可)
file_template = %%(rev)s_%%(slug)s

# 时间戳格式
timezone = UTC

# sqlalchemy.url 留空, 由 env.py 从环境变量 DATABASE_URL 注入
sqlalchemy.url =

# 输出编码
output_encoding = utf-8


# ==============================================================================
# 日志配置
# ==============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
